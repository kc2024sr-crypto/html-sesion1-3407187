<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .titulo{
            color:rgb(95, 72, 72);
            font-size:15px;
            background-color:rgb(0, 174, 255);
            letter-spacing:3px;
        }
            .menu{
                display: inline;
                background-color: cadetblue;
                color: rgb(0, 0, 0);
                width: 500px;
                height: 100px;
        }
    
            .menu_block{
                display: block;
                background-color: cadetblue;
                color: rgb(0, 0, 0);
                width: 500px;
                height: 100px;
            }
    </style>
</head>
<body>
    <h1 class="titulo">Elementos inline</H1>
    <div class="menu">Productos</div>
    <div class="menu">Servicios</div>
    <div class="menu">Contacto</div>
    <hr>
    <h1 class="titulo">Elementos Block</H1>
    <div class="menu_block">Productos</div>
    <div class="menu_block">Servicios</div>
    <div class="menu_block">Contacto</div>


</body>
</html>
