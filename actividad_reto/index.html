<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reto Box Model</title>
    <style>
        body {
            background-color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .contenedor-reto {
            width: 500px;
            height: 300px;
            background-color: #ffffff; /* Mismo color que el fondo */
            
           
           
            border-top: 8px double #b08d2b;

            
            border-left: 14px solid #0d3b66;

            
            border-right: 12px dashed #7b2cbf;

            
            border-bottom: 3px solid #489fb5;
        }
    </style>
</head>
<body>
    <div class="contenedor-reto"></div>
</body>
</html>
